<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <!-- Isotipo Digitel — la "g" caracteristica morada -->
  <!-- Color oficial: Pantone 2597c / #7B2D8B -->
  
  <!-- Circulo de la g -->
  <circle cx="50" cy="42" r="30" fill="#7B2D8B"/>
  <circle cx="50" cy="42" r="18" fill="white"/>
  
  <!-- Apertura izquierda de la G -->
  <rect x="20" y="28" width="30" height="28" fill="white"/>
  
  <!-- Barra interior horizontal -->
  <rect x="46" y="36" width="34" height="12" rx="6" fill="#7B2D8B"/>
  
  <!-- Cola inferior curva caracteristica -->
  <path d="M 50 70 Q 52 96 30 102 Q 16 106 13 95"
        stroke="#7B2D8B" stroke-width="11"
        fill="none" stroke-linecap="round"/>
</svg>
