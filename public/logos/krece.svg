<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 48">
    <!-- Caja teal del icono K -->
    <rect x="0" y="4" width="40" height="40" rx="8" fill="#29C5CC"/>
    <!-- Letra K blanca -->
    <text x="20" y="32" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="white">K</text>
    <!-- Texto "Krece" blanco -->
    <text x="100" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="white">Krece</text>
    <!-- Símbolo registro -->
