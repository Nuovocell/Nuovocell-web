<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48">
    <!-- Icono de la naranja (círculo con líneas verticales) en naranja -->
    <ellipse cx="22" cy="24" rx="18" ry="22" fill="none" stroke="#F08105" stroke-width="2.5"/>
    <ellipse cx="22" cy="24" rx="10" ry="22" fill="none" stroke="#F08105" stroke-width="2"/>
    <ellipse cx="22" cy="24" rx="3" ry="22" fill="none" stroke="#F08105" stroke-width="1.5"/>
    <line x1="4" y1="24" x2="40" y2="24" stroke="#F08105" stroke-width="2"/>
    <!-- Texto "tu zona" naranja pequeño -->
    <text x="115" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#F08105">tu zona</text>
    <!-- Texto "naranja" blanco grande -->
    <text x="115" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="800" fill="white">naranja</text>
</svg>
